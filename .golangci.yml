version: "2"

run:
  timeout: 5m
  # No default build-tags here: broker/*.go entry files are mutually
  # exclusive per-tag (each declares GetRootCommand for exactly one
  # broker), so linting all tags at once causes redeclaration errors.
  # CI passes one tag at a time via --build-tags; see lint.yml.

linters:
  default: standard
  enable:
    - misspell
    - revive
    - unconvert

formatters:
  enable:
    - gofmt
    - goimports
