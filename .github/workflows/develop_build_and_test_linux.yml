name: build develop

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  linux-amd64:
    name: Build and test linux/amd64
    runs-on: ubuntu-latest
    services:
      artemis:
        image: apache/activemq-artemis:latest-alpine
        ports:
          - 5672:5672
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.0
      - name: Check out code
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Get dependencies
        run: go mod download
      - name: Build
        run: go build -v -tags artemis -o amc .
      - name: Run unit tests
        run: go test -short ./...
      - name: Wait for Artemis
        run: |
          for attempt in {1..60}; do
            if (echo > /dev/tcp/127.0.0.1/5672) >/dev/null 2>&1; then
              echo "Artemis is ready"
              exit 0
            fi
            echo "Waiting for Artemis on localhost:5672..."
            sleep 2
          done
          echo "Artemis did not become ready in time" >&2
          exit 1
      - name: Run integration tests
        run: ./run-tests.sh

  macos-amd64:
    name: Build macos/amd64
    runs-on: macos-26
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.0
      - name: Check out code
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Get dependencies
        run: go mod download
      - name: Build
        run: go build -v -tags artemis -ldflags="-X
          'github.com/makibytes/xmc/cmd.version=${{ github.ref_name }}'" -o amc
          .
      - name: Run tests
        run: go test -short ./...

  windows-amd64:
    name: Build windows/amd64
    runs-on: windows-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.0
      - name: Check out code
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Get dependencies
        run: go mod download
      - name: Build
        run: go build -v -tags artemis -ldflags="-X
          'github.com/makibytes/xmc/cmd.version=${{ github.ref_name }}'" -o
          amc.exe .
      - name: Run unit tests
        run: go test -short ./...
