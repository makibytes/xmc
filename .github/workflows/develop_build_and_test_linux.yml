name: build develop

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  linux-amd64:
    name: Build and test linux/amd64
    runs-on: ubuntu-latest
    services:
      artemis:
        image: apache/activemq-artemis:latest-alpine
        ports:
          - 5672:5672
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.0
      - name: Check out code
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Get dependencies
        run: go mod download
      - name: Build all broker binaries
        run: |
          go build -v -tags artemis  -o amc .
          go build -v -tags aws      -o awsmc .
          go build -v -tags azure    -o azmc .
          go build -v -tags google   -o gmc .
          go build -v -tags kafka    -o kmc .
          go build -v -tags mqtt     -o mmc .
          go build -v -tags nats     -o nmc .
          go build -v -tags pulsar   -o pmc .
          go build -v -tags rabbitmq -o rmc .
          go build -v -tags redis    -o redmc .
      - name: Run unit tests
        run: go test -short ./...
      - name: Wait for Artemis
        run: |
          for attempt in {1..60}; do
            if (echo > /dev/tcp/127.0.0.1/5672) >/dev/null 2>&1; then
              echo "Artemis is ready"
              exit 0
            fi
            echo "Waiting for Artemis on localhost:5672..."
            sleep 2
          done
          echo "Artemis did not become ready in time" >&2
          exit 1
      - name: Run integration tests
        run: ./run-tests.sh

  macos-amd64:
    name: Build macos/amd64
    runs-on: macos-26
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.0
      - name: Check out code
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Get dependencies
        run: go mod download
      - name: Build all broker binaries
        run: |
          go build -v -tags artemis  -ldflags="-X 'github.com/makibytes/xmc/cmd.version=${{ github.ref_name }}'" -o amc .
          go build -v -tags aws      -ldflags="-X 'github.com/makibytes/xmc/cmd.version=${{ github.ref_name }}'" -o awsmc .
          go build -v -tags azure    -ldflags="-X 'github.com/makibytes/xmc/cmd.version=${{ github.ref_name }}'" -o azmc .
          go build -v -tags google   -ldflags="-X 'github.com/makibytes/xmc/cmd.version=${{ github.ref_name }}'" -o gmc .
          go build -v -tags kafka    -ldflags="-X 'github.com/makibytes/xmc/cmd.version=${{ github.ref_name }}'" -o kmc .
          go build -v -tags mqtt     -ldflags="-X 'github.com/makibytes/xmc/cmd.version=${{ github.ref_name }}'" -o mmc .
          go build -v -tags nats     -ldflags="-X 'github.com/makibytes/xmc/cmd.version=${{ github.ref_name }}'" -o nmc .
          go build -v -tags pulsar   -ldflags="-X 'github.com/makibytes/xmc/cmd.version=${{ github.ref_name }}'" -o pmc .
          go build -v -tags rabbitmq -ldflags="-X 'github.com/makibytes/xmc/cmd.version=${{ github.ref_name }}'" -o rmc .
          go build -v -tags redis    -ldflags="-X 'github.com/makibytes/xmc/cmd.version=${{ github.ref_name }}'" -o redmc .
      - name: Run tests
        run: go test -short ./...

  windows-amd64:
    name: Build windows/amd64
    runs-on: windows-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.0
      - name: Check out code
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Get dependencies
        run: go mod download
      - name: Build all broker binaries
        run: |
          go build -v -tags artemis  -ldflags="-X 'github.com/makibytes/xmc/cmd.version=${{ github.ref_name }}'" -o amc.exe .
          go build -v -tags aws      -ldflags="-X 'github.com/makibytes/xmc/cmd.version=${{ github.ref_name }}'" -o awsmc.exe .
          go build -v -tags azure    -ldflags="-X 'github.com/makibytes/xmc/cmd.version=${{ github.ref_name }}'" -o azmc.exe .
          go build -v -tags google   -ldflags="-X 'github.com/makibytes/xmc/cmd.version=${{ github.ref_name }}'" -o gmc.exe .
          go build -v -tags kafka    -ldflags="-X 'github.com/makibytes/xmc/cmd.version=${{ github.ref_name }}'" -o kmc.exe .
          go build -v -tags mqtt     -ldflags="-X 'github.com/makibytes/xmc/cmd.version=${{ github.ref_name }}'" -o mmc.exe .
          go build -v -tags nats     -ldflags="-X 'github.com/makibytes/xmc/cmd.version=${{ github.ref_name }}'" -o nmc.exe .
          go build -v -tags pulsar   -ldflags="-X 'github.com/makibytes/xmc/cmd.version=${{ github.ref_name }}'" -o pmc.exe .
          go build -v -tags rabbitmq -ldflags="-X 'github.com/makibytes/xmc/cmd.version=${{ github.ref_name }}'" -o rmc.exe .
          go build -v -tags redis    -ldflags="-X 'github.com/makibytes/xmc/cmd.version=${{ github.ref_name }}'" -o redmc.exe .
      - name: Run unit tests
        run: go test -short ./...
