name: lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  golangci-lint:
    name: golangci-lint (${{ matrix.tag }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # ibmmq is excluded: it needs the proprietary IBM MQ C client
        # libraries, only available in the build/ibmmq Docker builder image.
        tag: [none, artemis, aws, azure, google, kafka, mqtt, nats, pulsar, rabbitmq, redis]
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.0
      - name: Check out code
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          # The repo has a pre-existing lint backlog; only fail on issues
          # introduced by this push/PR so adoption doesn't require fixing
          # everything up front. Remove once the backlog above is cleared.
          only-new-issues: true
          args: >-
            ${{ matrix.tag == 'none' && '' || format('--build-tags={0}', matrix.tag) }}
